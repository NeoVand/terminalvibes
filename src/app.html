<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<link rel="icon" type="image/png" sizes="64x64" href="%sveltekit.assets%/favicon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#0d0906" />
		<!-- description/og/twitter meta live in each page's <svelte:head> so the
		     standalone /parts pages can carry their own titles and social cards
		     (crawlers take the FIRST og:* tag, so a shared set here would win
		     over any per-page override). -->
		<script>
			// Apply the theme before first paint to avoid a flash of the wrong one.
			// Mirrors $lib/theme.ts (loadThemePreference + applyTheme), and MUST stay
			// in step with it: dark is the default. Absent a stored value we stamp
			// `dark` explicitly rather than leaving it to the prefers-color-scheme
			// media query — which would otherwise show light on a light-mode OS for
			// the moment before hydration corrects it. `light` and `system` still
			// come only from an explicit choice; `system` adds no class and lets the
			// media query decide, which is what the reader asked for by picking it.
			try {
				const theme = localStorage.getItem('terminalvibes-theme');
				if (theme === 'light' || theme === 'dark') {
					document.documentElement.classList.add(theme);
				} else if (theme !== 'system') {
					document.documentElement.classList.add('dark');
				}
			} catch {
				document.documentElement.classList.add('dark');
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
