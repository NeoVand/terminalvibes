<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<link rel="icon" type="image/png" sizes="64x64" href="%sveltekit.assets%/favicon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#0c110a" />
		<meta
			name="description"
			content="The Terminal for Vibe Coders — an interactive, visual tutorial that teaches the command line to AI-assisted developers. Learn navigation, pipes, permissions, and how to audit AI-proposed commands."
		/>
		<meta property="og:title" content="TerminalVibes — The Terminal for Vibe Coders" />
		<meta
			property="og:description"
			content="An interactive, visual terminal tutorial for AI-assisted developers. Learn navigation, pipes, permissions, and command auditing."
		/>
		<meta property="og:image" content="%sveltekit.assets%/og-image.png" />
		<meta
			property="og:image:alt"
			content="The Terminal for Vibe Coders — read, verify, and run shell commands with confidence"
		/>
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="TerminalVibes — The Terminal for Vibe Coders" />
		<meta
			name="twitter:description"
			content="An interactive, visual terminal tutorial for AI-assisted developers."
		/>
		<meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />
		<meta
			name="twitter:image:alt"
			content="The Terminal for Vibe Coders — read, verify, and run shell commands with confidence"
		/>
		<script>
			// Apply the stored theme before first paint to avoid a flash of the
			// wrong theme. Mirrors $lib/theme.ts applyTheme.
			try {
				const theme = localStorage.getItem('terminalvibes-theme');
				if (theme === 'light' || theme === 'dark') {
					document.documentElement.classList.add(theme);
				}
			} catch {
				/* storage unavailable — system theme applies */
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
