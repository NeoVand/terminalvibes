name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monday 07:00 UTC — catches newly published advisories against code that
    # hasn't changed, which is most of the value for a site that ships rarely.
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload findings to the Security tab
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # security-extended adds the lower-severity rules; this codebase is
          # small enough that the extra noise is manageable and the extra
          # coverage is worth it.
          queries: security-extended

      # No build step: the JS/TS analyzer extracts straight from source, and
      # the site is a static SvelteKit build with no server code to compile.
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
